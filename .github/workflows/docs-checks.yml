name: Docs checks

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: git diff --check
      - run: python scripts/check_markdown_links.py
